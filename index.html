<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Setlist 🎵</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Mi Setlist</h1>
    </header>

    <main class="app-container">
      <!-- SECCIÓN DE BÚSQUEDA (HU1 - Criterio 1) -->
      <section class="search-section">
        <h2>Buscar Canciones</h2>
        <!-- Usamos un formulario nativo para capturar el botón y el Enter al mismo tiempo -->
        <form id="formulario-busqueda" class="search-form">
          <input
            type="text"
            id="input-busqueda"
            placeholder="Escribe un artista o canción..."
            required
          />
          <button type="submit" id="boton-buscar">Buscar</button>
        </form>
      </section>

      <!-- SECCIÓN DE RESULTADOS (HU1 - Criterios 2, 3, 4 y 5) -->
      <section class="results-section">
        <div id="resultados-busqueda" class="results-container">
          <!-- Aquí se inyectará dinámicamente el spinner, las canciones, los mensajes o los errores -->
          <p class="estado-vacio">
            Usa el buscador de arriba para encontrar tus canciones favoritas.
          </p>
        </div>
      </section>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
