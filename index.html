<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Setlist 🎵</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <!-- COLUMNA IZQUIERDA: SIDEBAR (Playlists) -->
      <aside class="sidebar">
        <header class="sidebar-header">
          <h2>🎵 Mi Setlist</h2>
        </header>

        <!-- HU2 - Criterio 1: Formulario para crear Playlist -->
        <section class="playlist-creator">
          <h3>Crear Playlist</h3>
          <form id="formulario-playlist" class="playlist-form">
            <div class="input-group">
              <input
                type="text"
                id="input-playlist"
                placeholder="Nombre de la nueva playlist..."
              />
              <!-- HU2 - Criterio 3: Advertencia visual -->
              <span id="advertencia-playlist" class="advertencia-texto ocultar">
                El nombre no puede estar vacío.
              </span>
            </div>
            <button type="submit" id="boton-crear-playlist">Crear</button>
          </form>
        </section>

        <!-- HU2 - Criterios 2 y 4: Lista de Playlists -->
        <section class="playlists-section">
          <h3>Mis Playlists</h3>
          <div id="lista-playlists" class="playlists-container">
            <!-- Las playlists o mensaje de estado vacío se inyectan aquí -->
          </div>
        </section>
      </aside>

      <!-- COLUMNA DERECHA: MAIN CONTENT (Doble Vista: Buscador o Playlist) -->
      <main class="main-content">
        <!-- VISTA 1: BUSCADOR DE CANCIONES (HU1) -->
        <div id="vista-buscador">
          <header class="main-header">
            <h1>Explorar Catálogo</h1>
          </header>

          <section class="search-section">
            <form id="formulario-busqueda" class="search-form">
              <input
                type="text"
                id="input-busqueda"
                placeholder="Escribe un artista o canción..."
                required
              />
              <button type="submit" id="boton-buscar">Buscar</button>
            </form>
          </section>

          <section class="results-section">
            <div id="resultados-busqueda" class="results-container">
              <p class="estado-vacio">
                Usa el buscador de arriba para encontrar tus canciones
                favoritas.
              </p>
            </div>
          </section>
        </div>

        <!-- VISTA 2: DETALLE DE PLAYLIST SELECCIONADA (HU4) -->
        <div id="vista-playlist" class="ocultar">
          <!-- Se inyecta dinámicamente con JS al seleccionar una playlist -->
        </div>
      </main>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
